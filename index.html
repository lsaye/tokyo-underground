<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TOKYO UNDERGROUND</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <header class="site-header">
        <h1 class="logo">TOKYO UNDERGROUND</h1>
        <nav class="nav">
            <ul>
                <li><a href="#intro">Intro</a></li>
                <li><a href="#story">Story</a></li>
                <li><a href="#credits">Credits</a></li>
            </ul>
        </nav>
    </header>

    <section id="intro" class="panel full-screen car-intro-panel">
    <div class="car-stage">
        <img src="images/frame1.png" class="car-frame" id="frame1" alt="Dashboard off" />
        <img src="images/frame2.png" class="car-frame" id="frame2" alt="Dashboard booting" />
        <img src="images/frame3.png" class="car-frame" id="frame3" alt="Dashboard on" />
        <button class="push-to-start-btn" id="pushToStart" aria-label="Push to Start"></button>
    </div>
    <div class="intro-prompt" id="introPrompt">
        <p class="neon-subtext pulse-text">PUSH TO START</p>
    </div>
    </section>

    <main id="story">

        <section class="story-panel" data-node="1">
            <div class="panel-content">
                <h3 class="panel-title neon-text">Panel Title</h3>
                <p class="panel-text">Panel text placeholder.</p>
            </div>
        </section>

        <section class="story-panel" data-node="2">
            <div class="panel-content">
                <h3 class="panel-title neon-text">Panel Title</h3>
                <p class="panel-text">Panel text placeholder.</p>
            </div>
        </section>

    </main>

    <section id="credits" class="panel">
        <h2 class="neon-text">Credits</h2>
        <ul class="credits-list">
            <li>Lucas Sayeau — Code & Interactivity</li>
            <li>Cole Champion — Design</li>
            <li>Carlos Valdez — Art & Visuals</li>
        </ul>
    </section>

    <footer class="site-footer">
        <p>© 2024 TOKYO UNDERGROUND</p>
    </footer>
    
    <script src="interactivity.js"></script>

</body>
</html>
